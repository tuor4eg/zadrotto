services:
  app:
    image: ghcr.io/tuor4eg/zadrotto:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      AUTHOR_SESSION_SECRET: ${AUTHOR_SESSION_SECRET}
      COVER_CANDIDATE_SECRET: ${COVER_CANDIDATE_SECRET}
      COVER_PROVIDER_CREDENTIALS_KEY: ${COVER_PROVIDER_CREDENTIALS_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "127.0.0.1:6379:6379"

  migrate:
    image: ghcr.io/tuor4eg/zadrotto-migrator:latest
    command: npm run db:migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    profiles: [migrate]

  seed-admin:
    image: ghcr.io/tuor4eg/zadrotto-migrator:latest
    command: npm run db:seed:admin
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_LOGIN: ${ADMIN_LOGIN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    profiles: [seed]

  cover-thumbs:
    image: ghcr.io/tuor4eg/zadrotto-migrator:latest
    command: npm run covers:backfill-thumbs
    environment:
      DATABASE_URL: ${DATABASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
    profiles: [tools]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    profiles: [local]

volumes:
  minio_data:
