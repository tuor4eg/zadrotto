services:
  app:
    image: ghcr.io/tuor4eg/zadrotto:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SITE_URL: ${SITE_URL}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      AUTHOR_SESSION_SECRET: ${AUTHOR_SESSION_SECRET}
      COVER_CANDIDATE_SECRET: ${COVER_CANDIDATE_SECRET}
      COVER_PROVIDER_CREDENTIALS_KEY: ${COVER_PROVIDER_CREDENTIALS_KEY}
      AUTHOR_REGISTRATION_ENABLED: ${AUTHOR_REGISTRATION_ENABLED:-false}
      AUTHOR_REGISTRATION_ACCESS_PROFILE_CODE: ${AUTHOR_REGISTRATION_ACCESS_PROFILE_CODE:-}
      EMAIL_OUTBOX_ENCRYPTION_KEY: ${EMAIL_OUTBOX_ENCRYPTION_KEY}
      EMAIL_PROVIDER_CREDENTIALS_KEY: ${EMAIL_PROVIDER_CREDENTIALS_KEY}
      AUTH_EMAIL_WORKER_SECRET: ${AUTH_EMAIL_WORKER_SECRET}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
    depends_on:
      - redis

  email-worker:
    image: curlimages/curl:8.21.0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          if response=$$(curl --silent --show-error --fail-with-body --connect-timeout 5 --max-time 30 --request POST --header "Authorization: Bearer $${AUTH_EMAIL_WORKER_SECRET}" http://app:3000/api/internal/auth-email-outbox 2>&1); then
            echo "auth-email-outbox: request completed"
            [ -z "$$response" ] || echo "$$response"
          else
            echo "auth-email-outbox: request failed; retrying later"
            [ -z "$$response" ] || echo "$$response"
          fi
          sleep 60
        done
    environment:
      AUTH_EMAIL_WORKER_SECRET: ${AUTH_EMAIL_WORKER_SECRET}
    depends_on:
      - app

  auth-cleanup-worker:
    image: curlimages/curl:8.21.0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          if response=$$(curl --silent --show-error --fail-with-body --connect-timeout 5 --max-time 30 --request POST --header "Authorization: Bearer $${AUTH_EMAIL_WORKER_SECRET}" http://app:3000/api/internal/auth-cleanup 2>&1); then
            echo "auth-cleanup: request completed"
            [ -z "$$response" ] || echo "$$response"
            sleep 86400
          else
            echo "auth-cleanup: request failed; retrying in 60 seconds"
            [ -z "$$response" ] || echo "$$response"
            sleep 60
          fi
        done
    environment:
      AUTH_EMAIL_WORKER_SECRET: ${AUTH_EMAIL_WORKER_SECRET}
    depends_on:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "127.0.0.1:6379:6379"

  migrate:
    image: ghcr.io/tuor4eg/zadrotto-migrator:latest
    command: npm run db:migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    profiles: [migrate]

  seed-admin:
    image: ghcr.io/tuor4eg/zadrotto-migrator:latest
    command: npm run db:seed:admin
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_LOGIN: ${ADMIN_LOGIN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    profiles: [seed]

  cover-thumbs:
    image: ghcr.io/tuor4eg/zadrotto-migrator:latest
    command: npm run covers:backfill-thumbs
    environment:
      DATABASE_URL: ${DATABASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
    profiles: [tools]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    profiles: [local]

volumes:
  minio_data:
